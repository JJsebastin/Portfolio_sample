<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jezreel | Personal Portfolio</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
    <main class="portfolio-shell">
        <section class="top-strip" aria-label="Portfolio intro row">
            <div class="brand-icon"><i class='bx bxs-star'></i></div>
            <p class="site-tag">Personal portfolio website</p>
            <p class="year">2026</p>
        </section>

        <h1 class="bg-word left">PORT</h1>
        <h1 class="bg-word right">FOLIO</h1>

        <section class="showcase-wrap" aria-label="Hero showcase">
            <article class="showcase-card">
                <div class="card-topbar">
                    <nav>
                        <a href="Portfolio.html" class="active">About Me</a>
                        <a href="skills.html">Portfolio</a>
                        <a href="education.html">Services</a>
                        <a href="blog.html">Blog</a>
                    </nav>
                    <a href="contact.html" class="book-call">Book A Call <i class='bx bx-up-arrow-alt'></i></a>
                </div>

                <div class="designer-label">Software Developer</div>

                <div class="stats-row">
                    <div>
                        <h3>+12</h3>
                        <p>Projects completed</p>
                    </div>
                    <div>
                        <h3>+04</h3>
                        <p>Internships & roles</p>
                    </div>
                </div>

                <div class="hero-content">
                    <div class="intro-copy">
                        <h2>Hello</h2>
                        <p>— It’s Jezreel, a software developer focused on modern web experiences and practical security.</p>
                        <p class="scroll-tip">Scroll down <i class='bx bx-down-arrow-alt'></i></p>
                    </div>
                    <div class="portrait-frame">
                        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=900&q=80" alt="Jezreel portrait">
                    </div>
                </div>

                <p class="year-vertical">2026</p>
            </article>

            <p class="outer-scroll">Scroll down <i class='bx bx-down-arrow-alt'></i></p>
        </section>
    </main>

</html>
