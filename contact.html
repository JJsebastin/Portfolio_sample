<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_additional.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="script2.js"></script>
    <script src="script1.js"></script>   
</head>
<body>
    <header>
        <a href="Portfolio.html" class="logo">Jezreel</a>
        <nav>
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>            
            <a href="blog.html">Blog</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
        <div class="toggle">
            <a href="Portfolio.html"><i class='bx bxs-home-circle toggle-icon'></i></a>
        </div>
    </header>

    <section class="contact" id="contact">
        <div class="container">
            <h1>Contact Me</h1>
            <p>If you'd like to get in touch, feel free to reach out using the form below.</p>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Your message..." rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </section>
</body>
</html>
